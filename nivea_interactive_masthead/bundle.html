<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no"/>
<title>NIVEA · İnteraktif Masthead</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --nivea:#1c359b; }
  *,*::before,*::after{box-sizing:border-box}
  *{margin:0}
  body{line-height:1.5;-webkit-font-smoothing:antialiased;font-family:'NIVEA Brand Type',"Nunito",system-ui,Arial,sans-serif;
    background:#dfeaf6;min-height:100vh}
  img,picture,video,canvas,svg{display:block;max-width:100%}
  button{background:transparent;border:none;padding:0;margin:0;font:inherit;cursor:pointer}

  /* ===== Bundle responsive masthead canvas (production yapısı) ===== */
  #App{
    aspect-ratio:948 / 416;
    max-height:416px;
    max-width:948px;
    width:100%;
    height:auto;
    position:absolute;
    margin-left:auto;margin-right:auto;left:0;right:0;
    overflow:hidden;
    isolation:isolate;
    container-type:inline-size;          /* tüm ölçüler #App genişliğine göre (cqw) */
    background:#bcd6ea;
  }
  .screen .bg{position:absolute;z-index:0}
  .q .bg{inset:0;width:100%;height:100%;object-fit:cover}                 /* soru: soft deniz, kapla */
  .r .bg{left:0;top:0;width:128.69%;height:106.49%;max-width:none}        /* sonuç: Figma kırpması (1220×443) — podyum */
  .mh-logo{position:absolute;z-index:3}.mh-logo img{width:100%;height:100%}

  /* ekranlar — yatay kayma geçişi */
  .screen{position:absolute;inset:0;z-index:2;opacity:0;pointer-events:none;
    transition:transform .52s cubic-bezier(.6,0,.18,1), opacity .42s}
  .q{transform:translateX(-100%)}
  .r{transform:translateX(100%)}
  .screen.on{opacity:1;pointer-events:auto;transform:translateX(0)}

  /* soru */
  .q .mh-logo{top:11.3%;right:5.7%;width:11.2cqw;aspect-ratio:1}
  .q .title{position:absolute;left:6.6%;top:11%;width:69%;color:#fff;font:800 5.3cqw/1.06 'NIVEA Brand Type',"Nunito";letter-spacing:-.01em}
  .q .title .hl{color:var(--nivea)}
  .opts{position:absolute;left:50%;transform:translateX(-50%);top:43.5%;width:86.3%;display:grid;grid-template-columns:1fr 1fr;gap:1.9cqw}
  .opt{background:#fff;color:var(--nivea);border-radius:100px;height:9cqw;display:flex;align-items:center;justify-content:center;
    padding:0 2cqw;font:800 3.15cqw/1 'NIVEA Brand Type',"Nunito";text-transform:uppercase;letter-spacing:.01em;white-space:nowrap;
    box-shadow:0 .5cqw 1.5cqw rgba(20,40,90,.18);transition:transform .12s,background .15s,font-weight .1s;width:100%}
  .opt:hover{background:#eef3ff}
  .opt.pressed{background:rgba(255,255,255,.3);font-weight:600;box-shadow:none}  /* Figma seçili/pressed */

  /* sonuç */
  .r .mh-logo{top:7%;left:5.5%;width:8.4cqw;aspect-ratio:1}
  .r .rtext{position:absolute;left:6.2%;top:26.5%;width:49%;color:#fff;font:800 2.95cqw/1.2 'NIVEA Brand Type',"Nunito"}
  .r .rtext .hl{color:var(--nivea)}
  .r .kesfet{position:absolute;left:6.4%;top:75%;background:var(--nivea);color:#fff;border-radius:100px;text-decoration:none;
    padding:0 4.5cqw;height:6.6cqw;display:flex;align-items:center;justify-content:center;font:700 3.15cqw/1 'NIVEA Brand Type',"Nunito";
    box-shadow:0 .6cqw 1.6cqw rgba(20,40,90,.3);transition:transform .12s,filter .15s}
  .r .kesfet:hover{filter:brightness(1.1)}
  .r .prod{position:absolute;z-index:2}                                   /* konum JS'ten (Figma koordinatı) */
  .r .rshadow{position:absolute;z-index:1;border-radius:50%;
    background:radial-gradient(closest-side,rgba(18,38,80,.30),rgba(18,38,80,0) 70%)}  /* ürün temas gölgesi */
</style>
</head>
<body>
  <div id="App"></div>

  <!-- Bundle cihaz verisi (uygulama bu değerleri doldurur) -->
  <input id="device_model" name="device_model" type="hidden" value="Bundle_Device_Model"/>
  <input id="device_system" name="device_system" type="hidden" value="Bundle_Device_System_Version"/>
  <input id="device_token" name="device_token" type="hidden" value="Bundle_Device_Id"/>
  <input id="device_location" name="device_location" type="hidden" value="Bundle_Device_Location"/>
  <input id="device_platform" name="device_platform" type="hidden" value="Bundle_Device_Platform"/>
  <input id="device_onesignal" name="device_onesignal" type="hidden" value="Bundle_OneSignal_Id"/>

<script>
(()=>{
  "use strict";

  const CAMPAIGN = "nivea-masthead-190626";
  const IMP_URL  = "https://bit.ly/4oyzcqo"; // gösterim (impression)

  // Görseller BASE + dosya_adı ile çekilir.
  //   Lokal/önizleme : "assets/"
  //   Canlı (S3)     : "https://static.bundle.app/ad-assets/nivea-masthead-190626/"
  const BASE = "assets/";

  // NIVEA marka fontu — @font-face'i BASE'e göre enjekte et (lokal: assets/, canlı: S3)
  document.head.insertAdjacentHTML("beforeend",
    `<style>@font-face{font-family:'NIVEA Brand Type';font-weight:100 900;font-style:normal;font-display:swap;src:url('${BASE}NIVEABrandType-Bold.otf') format('opentype')}</style>`);

  // cevaba göre sonuç + yönlendirme (Figma'daki Masthead 2-5)
  // pos/sh = ürün ve temas gölgesinin Figma koordinatı (948×416 frame'in %'si)
  const RESULTS = {
    leke:{product:BASE+"prod-luminous.png",parts:["Aydınlık bir cilt için ","NIVEA Luminous630 Günlük UV Yüz Bakım Kremi SPF50"," ile yüksek güneş koruması & leke karşıtı etki"],url:"https://bit.ly/4fVLFSR",
      pos:{l:71.98,t:11.30,w:7.82,h:72.60}, sh:{l:70.25,t:82.93,w:11.50,h:1.44}},
    cam: {product:BASE+"prod-skinglow.png",parts:["Cam cilt etkisi için ","NIVEA Skin Glow Günlük UV Fluid SPF50"," ile yüksek güneş koruması & anında 3 boyutlu parlaklık"],url:"https://bit.ly/4w2UwHi",
      pos:{l:68.28,t:11.06,w:16.36,h:75.96}, sh:{l:67.51,t:82.69,w:18.14,h:1.92}},
    sik: {product:BASE+"prod-q10.png",parts:["Daha sıkı bir cilt için ","NIVEA Q10 Günlük UV Fluid SPF50"," ile yüksek güneş koruması & kırışıklık karşıtı etki"],url:"https://bit.ly/4vmDfJe",
      pos:{l:72.13,t:11.06,w:7.67,h:73.08}, sh:{l:70.57,t:82.69,w:10.23,h:1.68}},
    siv: {product:BASE+"prod-derma.png",parts:["Pürüzsüz bir cilt için ","NIVEA Derma Skin Clear Günlük UV Fluid SPF50"," ile yüksek güneş koruması & sivilce karşıtı etki"],url:"https://bit.ly/3ShUiNU",
      pos:{l:67.41,t:6.73,w:16.65,h:77.64}, sh:{l:67.62,t:83.17,w:16.46,h:1.68}},
  };
  const OPTIONS = [["LEKE KARŞITI ETKİ","leke"],["CAM CİLT ETKİSİ","cam"],["SIKILAŞTIRICI ETKİ","sik"],["SİVİLCE KARŞITI ETKİ","siv"]];

  /* ---- cihaz verisi ---- */
  const dv = id => { const e=document.getElementById(id); return (e&&e.value)||""; };
  const deviceData = () => ({
    device_model:dv("device_model"), device_system:dv("device_system"), device_token:dv("device_token"),
    device_location:dv("device_location"), device_platform:dv("device_platform"), device_onesignal:dv("device_onesignal")
  });

  /* ---- GA4 (Measurement Protocol) — production ile aynı yapı ---- */
  function createGA4({campaign, measurementId, apiSecretKey}){
    const clientId = (Math.random().toString(36).slice(2)) + Date.now();
    function pushEvent(action, label){
      try{
        fetch(`https://www.google-analytics.com/mp/collect?measurement_id=${measurementId}&api_secret=${apiSecretKey}`,{
          method:"POST",
          body:JSON.stringify({ client_id:clientId, events:[{ name:"item_impression", params:{ event_category:campaign, event_label:label } }] })
        }).then(r=>console.debug("GA4",r.status)).catch(e=>console.error(e));
      }catch(e){ console.error(e); }
    }
    return {
      pushEvent,
      sendItemImpression:t=>pushEvent("item_impression","impression:"+t),
      sendItemClick:t=>pushEvent("item_impression","click:"+t),
    };
  }
  const ga4 = createGA4({campaign:CAMPAIGN, measurementId:"G-7PNZ5E4JDZ", apiSecretKey:"RU0cCzDxRbCbpV6xOZ7xQA"});

  /* ---- cevabı backend'e gönder (production ile aynı yapı) ---- */
  function submitAnswers(answer){
    try{
      fetch("https://ife5auj23ef2xtcyabt2fpwfiy0gnsua.lambda-url.eu-central-1.on.aws",{
        method:"POST",
        headers:{ "Content-Type":"application/json", "x-api-key":"ArZSjxhp5LopgW4AhUVf6NWrRNAo3J39" },
        body:JSON.stringify(Object.assign({ campaign:CAMPAIGN, answer }, deviceData()))
      }).catch(e=>console.error("submitAnswers failed",e));
    }catch(e){ console.error("submitAnswers failed",e); }
  }

  /* ---- render ---- */
  const App = document.getElementById("App");
  App.innerHTML = `
    <img src="${IMP_URL}" alt="imp" style="width:1px;height:1px;display:none" referrerpolicy="no-referrer-when-downgrade">
    <section class="screen q on">
      <img class="bg" src="${BASE}bg.png" alt="">
      <div class="mh-logo"><img src="${BASE}nivea-logo.svg" alt="NIVEA"></div>
      <div class="title">Cildinizin ihtiyacına özel <span class="hl">güneş korumanızı</span> seçin!</div>
      <div class="opts"></div>
    </section>
    <section class="screen r">
      <img class="bg" src="${BASE}bg-result.png" alt="">
      <div class="rshadow"></div>
      <img class="prod" src="" alt="">
      <div class="mh-logo"><img src="${BASE}nivea-logo.svg" alt="NIVEA"></div>
      <p class="rtext"></p>
      <a class="kesfet" target="_blank" rel="noopener">Keşfet</a>
    </section>`;

  const sQ=App.querySelector(".q"), sR=App.querySelector(".r"), opts=App.querySelector(".opts");

  OPTIONS.forEach(([label,key])=>{
    const b=document.createElement("button"); b.className="opt"; b.textContent=label;
    // pressed (basılı) görünüm — production gibi basınca
    const press=()=>b.classList.add("pressed"), unpress=()=>b.classList.remove("pressed");
    b.addEventListener("pointerdown",press);
    b.addEventListener("pointerup",unpress);
    b.addEventListener("pointerleave",unpress);
    b.addEventListener("click",()=>choose(key));
    opts.appendChild(b);
  });

  const box=(el,p)=>{ el.style.left=p.l+"%"; el.style.top=p.t+"%"; el.style.width=p.w+"%"; el.style.height=p.h+"%"; };
  function choose(key){
    ga4.sendItemClick(key);     // tıklama eventi
    submitAnswers(key);         // cevabı + cihaz verisini backend'e gönder
    const r=RESULTS[key];
    sR.querySelector(".rtext").innerHTML = r.parts[0]+'<span class="hl">'+r.parts[1]+'</span>'+r.parts[2];
    const prod=sR.querySelector(".prod"); prod.src=r.product; box(prod,r.pos);   // ürünü Figma konumuna oturt
    box(sR.querySelector(".rshadow"), r.sh);                                      // temas gölgesi
    sR.querySelector(".kesfet").href = r.url;
    sQ.classList.remove("on"); sR.classList.add("on");
  }

  ga4.sendItemImpression("Home"); // gösterim eventi (yüklemede)
})();
</script>
</body>
</html>
